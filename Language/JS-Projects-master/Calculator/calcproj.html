<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Scientific Calculator System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 10px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .panel {
            background: #1e1e2f;
            padding: 15px;
            border-radius: 12px;
            color: white;
            width: 360px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h3 {
            margin-top: 0;
            text-align: center;
        }

        .display {
            background: black;
            color: #00ffcc;
            padding: 15px;
            font-size: 2rem;
            text-align: right;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .mode {
            text-align: center;
            margin-bottom: 8px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        button {
            padding: 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            background: #2d2d44;
            color: white;
        }

        button:hover {
            background: #3f3f60;
        }

        .operator { background: #ff9500; }
        .equal { background: #00cc99; grid-column: span 2; }
        .clear { background: #ff3b3b; }

        input, textarea {
            width: 100%;
            padding: 6px;
            border-radius: 6px;
            border: none;
            margin-bottom: 6px;
            resize: none;
        }

        textarea {
            height: 60px;
        }

        .history {
            max-height: 220px;
            overflow-y: auto;
            font-size: 0.85rem;
        }

        .history-item {
            background: #2d2d44;
            padding: 6px;
            margin-bottom: 5px;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Calculator -->
    <div class="panel">
        <div id="display" class="display">0</div>

        <div class="mode">
            <button id="modeBtn" onclick="toggleMode()">DEG</button>
            <button onclick="derivative()">d/dx</button>
        </div>

        <div class="buttons">
            <button class="clear" onclick="clearAll()">C</button>
            <button onclick="deleteLast()">DEL</button>
            <button onclick="press('(')">(</button>
            <button onclick="press(')')">)</button>
            <button class="operator" onclick="press('/')">÷</button>

            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button class="operator" onclick="press('*')">×</button>
            <button onclick="squareRoot()">√</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button class="operator" onclick="press('-')">−</button>
            <button onclick="square()">x²</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button class="operator" onclick="press('+')">+</button>
            <button onclick="reciprocal()">1/x</button>

            <button onclick="press('0')">0</button>
            <button onclick="press('.')">.</button>
            <button onclick="sin()">sin</button>
            <button onclick="cos()">cos</button>
            <button onclick="tan()">tan</button>

            <button onclick="log10()">log</button>
            <button onclick="ln()">ln</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>

        <div id="history-list" class="history"></div>
    </div>

    <!-- Equation Solver -->
    <div class="panel">
        <h3>System of Equations Solver</h3>

        <input id="e1" placeholder="2x + 3y + z = 1">
        <input id="e2" placeholder="4x - y + 2z = 5">
        <input id="e3" placeholder="x + 2y + 3z = 6 (optional)">

        <button onclick="solveSystem()">Solve</button>
    </div>

    <!-- Matrix Solver -->
    <div class="panel">
        <h3>Matrix Solver</h3>

        <textarea id="matrixA" placeholder="Matrix A:
1 2
3 4"></textarea>

        <textarea id="matrixB" placeholder="Matrix B:
5 6
7 8"></textarea>

        <button onclick="determinant()">Determinant</button>
        <button onclick="inverseMatrix()">Inverse</button>
        <button onclick="multiplyMatrix()">Multiply A × B</button>
    </div>

</div>

<script>
    let expression = "";
    let angleMode = "DEG";

    function press(v) {
        expression += v;
        updateDisplay(expression);
    }

    function updateDisplay(v) {
        document.getElementById("display").innerText = v;
    }

    function calculate() {
        try {
            let r = eval(expression);
            addHistory(expression + " = " + r);
            expression = r.toString();
            updateDisplay(expression);
        } catch {
            updateDisplay("Error");
        }
    }

    function clearAll() {
        expression = "";
        updateDisplay("0");
    }

    function deleteLast() {
        expression = expression.slice(0, -1);
        updateDisplay(expression || "0");
    }

    function addHistory(text) {
        let div = document.createElement("div");
        div.className = "history-item";
        div.innerText = text;
        document.getElementById("history-list").prepend(div);
    }

    function toggleMode() {
        angleMode = angleMode === "DEG" ? "RAD" : "DEG";
        document.getElementById("modeBtn").innerText = angleMode;
    }

    function toRad(v) {
        return angleMode === "DEG" ? v * Math.PI / 180 : v;
    }

    function sci(result, label) {
        addHistory(label + "(" + expression + ") = " + result);
        expression = result.toString();
        updateDisplay(expression);
    }

    function sin() { sci(Math.sin(toRad(eval(expression))), "sin"); }
    function cos() { sci(Math.cos(toRad(eval(expression))), "cos"); }
    function tan() { sci(Math.tan(toRad(eval(expression))), "tan"); }
    function log10() { sci(Math.log10(eval(expression)), "log"); }
    function ln() { sci(Math.log(eval(expression)), "ln"); }
    function squareRoot() { sci(Math.sqrt(eval(expression)), "√"); }
    function square() { sci(Math.pow(eval(expression), 2), "x²"); }
    function reciprocal() { sci(1 / eval(expression), "1/x"); }

    function derivative() {
        let f = prompt("Enter function in x:");
        if (!f) return;

        let df = f.replace(/x\^(\d+)/g, (m, p) => `${p}*x^${p - 1}`)
                .replace(/\bx\b/g, "1");

        alert("Derivative: " + df);
        addHistory("d/dx(" + f + ") = " + df);
    }

    function parseEq(eq) {
        eq = eq.replace(/\s+/g, "");
        let [L, R] = eq.split("=");

        let a = 0, b = 0, c = 0;

        L.replace(/([+-]?\d*)x/g, (_, n) => a += +(n || 1));
        L.replace(/([+-]?\d*)y/g, (_, n) => b += +(n || 1));
        L.replace(/([+-]?\d*)z/g, (_, n) => c += +(n || 1));

        return [a, b, c, parseFloat(R)];
    }

    function solveSystem() {
        let A = parseEq(e1.value);
        let B = parseEq(e2.value);
        let C = e3.value ? parseEq(e3.value) : null;

        if (!C) {
            let det = A[0]*B[1] - A[1]*B[0];
            let x = (A[3]*B[1] - A[1]*B[3]) / det;
            let y = (A[0]*B[3] - A[3]*B[0]) / det;
            alert(`x = ${x}, y = ${y}`);
            addHistory(`x=${x}, y=${y}`);
        } else {
            let [a,b,c,d] = A, [e,f,g,h] = B, [i,j,k,l] = C;
            let D = a*(f*k-g*j)-b*(e*k-g*i)+c*(e*j-f*i);
            let Dx = d*(f*k-g*j)-b*(h*k-g*l)+c*(h*j-f*l);
            let Dy = a*(h*k-g*l)-d*(e*k-g*i)+c*(e*l-h*i);
            let Dz = a*(f*l-h*j)-b*(e*l-h*i)+d*(e*j-f*i);

            alert(`x=${Dx/D}, y=${Dy/D}, z=${Dz/D}`);
            addHistory(`x=${Dx/D}, y=${Dy/D}, z=${Dz/D}`);
        }
    }

    function parseMatrix(id) {
        return document.getElementById(id).value
            .trim()
            .split("\n")
            .map(r => r.trim().split(/\s+/).map(Number));
    }

    function determinant() {
        let m = parseMatrix("matrixA");

        let det = m.length === 2
            ? m[0][0]*m[1][1] - m[0][1]*m[1][0]
            : m[0][0]*(m[1][1]*m[2][2]-m[1][2]*m[2][1])
            - m[0][1]*(m[1][0]*m[2][2]-m[1][2]*m[2][0])
            + m[0][2]*(m[1][0]*m[2][1]-m[1][1]*m[2][0]);

        alert("Determinant = " + det);
        addHistory("det = " + det);
    }

    function inverseMatrix() {
        let m = parseMatrix("matrixA");
        let d = m[0][0]*m[1][1] - m[0][1]*m[1][0];

        let inv = [
            [ m[1][1]/d, -m[0][1]/d ],
            [ -m[1][0]/d, m[0][0]/d ]
        ];

        alert(JSON.stringify(inv));
        addHistory("Inverse = " + JSON.stringify(inv));
    }

    function multiplyMatrix() {
        let A = parseMatrix("matrixA");
        let B = parseMatrix("matrixB");

        let R = A.map((r,i) =>
            B[0].map((_,j) =>
                r.reduce((s,_,k)=> s + A[i][k]*B[k][j], 0)
            )
        );

        alert(JSON.stringify(R));
        addHistory("A×B = " + JSON.stringify(R));
    }

    document.addEventListener("keydown", function(e) {
        const k = e.key;
        if ("0123456789+-*/().".includes(k)) press(k);
        else if (k === "Enter") calculate();
        else if (k === "Backspace") deleteLast();
        else if (k === "Escape") clearAll();
    });
</script>

</body>
</html>
