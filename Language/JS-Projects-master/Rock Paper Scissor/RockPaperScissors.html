<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors game</title>
    <style>
      body {
        background-color: rgb(39, 39, 39);
        color: aliceblue;
        font-family: arial;
      }
      button {
        background-color: transparent;
        border-radius: 50px;
        cursor: pointer;
        border: 2px solid white;
        margin-right: 10px;
        padding: 17px;
      }
      .rock-img,
      .paper-img,
      .scissors-img {
        height: 70px;
      }
      .reset-button,
      .auto-play {
        background-color: white;
        border: none;
        font-size: 15px;
        padding: 8px 15px;
        cursor: pointer;
      }
      .move-icon {
        height: 35px;
        background-color: transparent;
        border-radius: 50px;
        cursor: pointer;
        border: 2px solid white;
        margin-right: 10px;
        padding: 17px;
      }
    </style>
  </head>
  <!-- math.random genrate num 0<= and <1
    divid into 3 parts from 0 to 1/3 is r
    from 1/3 to 2/3 is p
    and last 2/3 to <1 is s-->
  <body>
    <h1>Rock Paper Scissors</h1>
    <button onclick="playGame('rock')">
      <img
        class="rock-img"
        src="../../../PROJECTS/React-Projects/RockPaperScissors-proj/src/assets/rock.png"
      />
    </button>
    <button onclick="playGame('paper')">
      <img
        class="paper-img"
        src="../../../PROJECTS/React-Projects/RockPaperScissors-proj/src/assets/paper.png"
      />
    </button>
    <button onclick="playGame('scissors')">
      <img
        class="scissors-img"
        src="../../../PROJECTS/React-Projects/RockPaperScissors-proj/src/assets/scissors.png"
      />
    </button>
    <p class="js-result"></p>
    <p class="js-moves"></p>
    <p class="js-score"></p>
    <button
      class="reset-button"
      onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');
        updateScore();
      "
    >
      Reset Score
    </button>
    <button class="auto-play" onclick="autoPlay()">Auto Play</button>

    <script>
      let score = JSON.parse(localStorage.getItem("score")) || {
        wins: 0,
        losses: 0,
        ties: 0,
      };
      /*if (!score){
                score = {
                    wins : 0,
                    losses : 0,
                    ties :0
                };
            } */

      document.body.addEventListener("keydown", (event) => {
        if (event.key === "r") {
          playGame("rock");
        } else if (event.key === "s") {
          playGame("scissors");
        } else if (event.key === "p") {
          playGame("paper");
        }
      });

      let isAutoPlaying = false;
      let intervalId;
      function autoPlay() {
        if (!isAutoPlaying) {
          intervalId = setInterval(() => {
            const playerMove = pickComputerMove();
            playGame(playerMove);
          }, 1000);
          isAutoPlaying = true;
        } else {
          clearInterval(intervalId);
          isAutoPlaying = false;
        }
      }

      function pickCompMove() {
        const rdmNum = Math.random();
        let cmpMove = "";
        console.log(rdmNum);
        if (rdmNum >= 0 && rdmNum < 0.33) {
          cmpMove = "rock";
        } else if (rdmNum >= 0.33 && rdmNum < 0.67) {
          cmpMove = "paper";
        } else if (rdmNum >= 0.67 && rdmNum < 1) {
          cmpMove = "scissors";
        }
        console.log(`computer move is : ${cmpMove}`);
        return cmpMove;
      }
      function playGame(playerMove) {
        const cmpMove = pickCompMove();
        let result = "";
        if (playerMove === cmpMove) {
          result = "tie";
        } else if (
          (playerMove === "rock" && cmpMove === "scissors") ||
          (playerMove === "paper" && cmpMove === "rock") ||
          (playerMove === "scissors" && cmpMove === "paper")
        ) {
          result = "won";
        } else {
          result = "lost";
        }

        if (result === "won") {
          score.wins += 1;
        } else if (result === "lost") {
          score.losses += 1;
        } else if (result === "tie") {
          score.ties += 1;
        }
        localStorage.setItem("score", JSON.stringify(score));

        updateScore();

        document.querySelector(".js-result").innerHTML = `you ${result}`;

        document.querySelector(".js-moves").innerHTML =
          `your move:<img src="../../../PROJECTS/React-Projects/RockPaperScissors-proj/src/assets/${playerMove}.png" class = 'move-icon'> <img src="../../../PROJECTS/React-Projects/RockPaperScissors-proj/src/assets/${cmpMove}.png" class = 'move-icon' >  : computer moves `;

        //alert(`You picked ${playerMove}. computer Moves ${cmpMove}. result is ${result}.
        //Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`)
      }

      function updateScore() {
        document.querySelector(".js-score").innerHTML = `You pla`.innerHTML = `
            Wins: ${score.wins} ,
            losses: ${score.losses}
            ties : ${score.ties}`;
      }
    </script>
  </body>
</html>
