<!DOCTYPE html>
<html>
    <head>
        <title>
            Hand Cricket
        </title>
        <style>
            body {
                background-color: black;
                color: aliceblue;
                font-family: Arial, Helvetica, sans-serif;
                text-align: center;
            }
            .game_name{
                background-color: black;
                color: white;
                align-content: center;
                font-weight: bold;
                font-style: normal;
            }
            button {
                margin: 5px;
                padding: 10px 15px;

    <body>

        <div class="buttons hidden" id="buttons">

            <button onclick="play(2)">2</button>
            <button onclick="play(3)">3</button>

            <button onclick="play(7)">7</button>
            <button onclick="play(8)">8</button>
            <button onclick="play(9)">9</button>
            <button onclick="play(10)">10</button>
        </div>
        <button id="restart" class="hidden" onclick="restartGame()">
            🔄 Restart
        </button>

                if(cmpMove === run){
                    console.log('player out');
                }

                    score = score + run ;
                }
            }
            function getRandomInt(min , max) {

            }

    </body>
</html>
