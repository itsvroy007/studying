<!DOCTYPE html>
<html>
    <title>React Exercise 2</title>
    <head>
        Exercise 2 SuperSimpleDev React course
    </head>
    <body>
        <div class="js-container"></div>

        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
        <script src="https://unpkg.com/supersimpledev/babel.js"></script>

        <script type="text/babel">
            function Intro(props){ 
                const message = props.message;
                return(
                    <div>
                        {message}
                        <br />
                        <br />
                    </div>  
                    );
                }

            function LoginForm(){ 
                return(
                    <>
                    <div>
                        <input placeholder="Email"/>
                    </div>    
                    <div>
                        <input placeholder="Password" type="Password" />    
                    </div>
                    <button>
                        Login
                    </button>
                    <button>
                        Sign up
                    </button>
                    </>
                );
            }



            function ProductDetails({imagesrc,item,price,discPrice}){
              const hasDisc = Number(discPrice)>0;

                return(
                  <>
                  <br/>
                  <img src= {imagesrc} width = "60"/>
                  {
                    hasDisc ? (
                      <>
                      <p>{item}</p>
                      <del>Price: ${price}</del>
                      <p>Discounted Price: ${discPrice}</p>
                      </>
                    ): (
                      <p>Price: ${price}</p>
                    )
                  }
                  <button>Add to Cart</button>
                  <br />
                  </>

                );
            }
            function App(){
                return(
                    <>
                        <Intro message="Hello, Welcome to my E-comm website"/>
                        <LoginForm  />
                         
                        <ProductDetails 
                          imagesrc="../images/cotton-socks.png"  
                          item= "Cotton Socks" 
                          price = {10.99} 
                          discPrice= {9.9}/>
                        
                        <ProductDetails 
                          imagesrc="../images/tennis-balls.png"
                          item= "Tennis Ball" 
                          price = {5.99} 
                          discPrice={5.4} />
                        
                        <ProductDetails 
                          imagesrc="../images/plain-t-shirt.png"
                          item= "Plain T-Shirt" 
                          price = {7.99} 
                          discPrice={7.2}/>
                        </>
                    );
                }
                const container = document.querySelector('.js-container');
                ReactDOM.createRoot(container).render(<App />);
                /*
                <p>Cotton Sock</p>
                <p>Price: $10.90</p>
                <button>Add to Cart</button>  inside app for only socks item */ 
        </script>
        
    </body>
</html>
