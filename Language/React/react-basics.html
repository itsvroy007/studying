<!DOCTYPE html>
<html>

  <head>
    <title>
        React Basics
    </title>
    <!-- React is advance version of js contain feature od both app and web dev 
        two type 
        React dom -> for website
        React native -> for apps
        -->
    
  </head>

  <body>
    <div class="js-container"></div>
    Welcome to supersimpledev React course 
    <!-- <script src="website_link.js"></script> will load website as js file then run-->

    <script src="https://unpkg.com/supersimpledev/react.js"></script> <!-- React load external lib (outside comp code into your website code ) --> 

    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script> <!--  babel -> convert other lang into js -->

    <!-- <script src="java_script file_name"></script>
          jsx -> js html -> html elem in script -->
    <script type="text/babel"> 
        
        const div = (
          <div>
            <button>hello</button>
            <p>This is paragragh of text </p>
          </div> 
          );
          const container = document.querySelector('.js-container');
          ReactDOM.createRoot(container).render(div); 
    </script>
          <!-- use of div since we cant use mutiple elem to render 
          use <> </> (called fragment) instead of <div> </div> 
          
          if statement in react -> not same as js so 
          const result = val1 && val2 ; if val1 true then value 2 is stored in result 
          

          use of link and to -> for faster loading of webpage  

          -->
  </body>
</html>
