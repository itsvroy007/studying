<!DOCTYPE html>
<html>
  <head>
    <title>
        ChatBot
    </title>
    <style>
      body{
        font-family: Arial;
        margin-top: 0px;
        margin-bottom: 0px; 
      }
      .send-button{
        background-color: rgb(25,135,84);
        color: white;
        padding:12px 20px;
        margin-left: 10px;
        border-radius: 10px;
        border: none;
        font-size: 15px;
      }
      
      .chat-input{
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;
        flex-grow: 1;
      }

      .chat-input-container{
        display: flex;
        margin-bottom: 15px;
      }

      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: start;
      }

      .chat-message-robot{
        display: flex;
        justify-content: start;
        align-items: start;
        
      }

      .chat-message-text{
        background-color: rgb(238,238,238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
        
      }
      .chat-message-profile{
        width: 45px;
      }

      .chat-messages-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }

    </style>
  </head>
  <body>
    <div class="js-container"></div>
    
    <script src="https://unpkg.com/supersimpledev/react.js"></script> 

    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel"> 
        function ChatInput({chatMessages,setChatMessages}){
          const [inputText , setInputText]= React.useState('');
          
          function saveInputText(event){
            setInputText(event.target.value);
          }

          function sendMessage(){
            const newChatMessages= ([
              ...chatMessages,
              {
                message: inputText,
                sender:'user',
                id: crypto.randomUUID()
              }
            ]); 

            setChatMessages(newChatMessages);

              const response = Chatbot.getResponse(inputText);

              setChatMessages([
              ...newChatMessages,
              {
                message: response,
                sender:'robot',
                id: crypto.randomUUID()
              }
            ]);
            
            setInputText('');
          }
            return(
                <div className="chat-input-container">
                  <input 
                  placeholder="Send a message to Chatbot" 
                  size="30" 
                  value= {inputText}
                  className="chat-input"
                  onChange={saveInputText}
                    onKeyDown={
                      (event) => {
                        if (event.key === 'Enter'){
                          sendMessage();
                        }
                        else if (event.key === 'Escape'){
                          setInputText('');
                        }
                      }
                    }
                    
                    />
                  <button className="send-button" onClick={sendMessage}>Send</button>
                </div>
            );
        }

        function ChatMessage({message,sender}){ // Chatmessage(props)
            // const message = props.message;  same as const {message} = props; 
            // const sender = props.sender  
            // const {message,sender} = props; 
            /*
            if (sender === 'robot'){
                return(
                    <div>
                        <img src="robot.png" width = "50" />    
                        {message}
                    </div>
                );
            }
            */
            
            return(
                <div className={
                  sender === 'user' 
                    ? 'chat-message-user' 
                    : 'chat-message-robot'
                }>
                  {sender === 'robot' && (<img src="images/robot.png" className="chat-message-profile" />) }
                  <div className="chat-message-text">{message}</div>
                  {sender === 'user' && (<img src="images/user.png" className="chat-message-profile"  />)}
                </div>
            );
        }

        function ChatMessages({chatMessages}){
          const chatMessagesRef = React.useRef(null);
          React.useEffect(() => {
            // console.log('updated');
            const containerElem = chatMessagesRef.current;
            if (containerElem){
              containerElem.scrollTop = containerElem.scrollHeight;
            }
            
          },[chatMessages]);
        /*function sendMessage(){
            setChatMessage([
              ...chatMessages,
              {
                message:'test',
                sender:'user',
                id: crypto.randomUUID()
              }
            ]);
            }*/
            return(
                <div className="chat-messages-container"
                ref = {chatMessagesRef}>
                {chatMessages.map((chatMessage) => {
                    return(
                        <ChatMessage 
                          key={chatMessage.id}
                          message={chatMessage.message} 
                          sender={chatMessage.sender}
                        />);
                      })}
                </div>
            );
        } 

        function App(){
          const [chatMessages,setChatMessages] = React.useState([{
                message:"hello Chatbot",
                sender:"user",
                id: "id1"
            },{
                message:"Hello How can I help you?",
                sender:"robot",
                id:"id2"
            },{
                message:"Can you get me todays date?",
                sender:"user",
                id:"id3"
            },{
                message:"Today is ",
                sender:"robot",
                id:"id4"
            }]);
          //const chatMessages= array[0];
          // const setChatMessage= array[1];

            return(
                <div className="app-container">
                  <ChatMessages  chatMessages={chatMessages}/>
                  <ChatInput
                    chatMessages={chatMessages}
                    setChatMessages={setChatMessages}
                  />
                </div>
            );
        }
        /*
        <ChatMessage message= "hello Chatbot" sender="user" />
        <ChatMessage message="Hello How can I help you?" sender="robot" />
        <ChatMessage message= "Can you get me today dates?" sender="user" />
        <ChatMessage message="Today is " sender="robot" />
        */
        
        
        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />); 
        </script>
  
</body>

</html>
